name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Zero runtime/dev dependencies by design — the whole pipeline is node:
      # builtins only — so there is nothing to install. If a dependency is ever
      # added, gate it behind a committed lockfile and an `npm ci` step here.
      - name: Run tests
        run: npm test
